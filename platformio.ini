[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed = 921600

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    lvgl/lvgl@^8.3.11

build_flags =
    ; ==============================
    ; TFT_eSPI setup for ESP32 + ILI9488 SPI 480x320
    ; ==============================
    -D USER_SETUP_LOADED
    -D ILI9488_DRIVER
    -D TFT_WIDTH=320
    -D TFT_HEIGHT=480

    ; SPI pins
    -D TFT_MOSI=23
    -D TFT_MISO=19
    -D TFT_SCLK=18

    ; Control pins
    -D TFT_CS=5
    -D TFT_DC=2
    -D TFT_RST=4

    ; Speed
    -D SPI_FREQUENCY=40000000
    -D SPI_READ_FREQUENCY=16000000

    ; Fonts for TFT_eSPI
    -D LOAD_GLCD
    -D LOAD_FONT2
    -D LOAD_FONT4
    -D LOAD_FONT6
    -D LOAD_FONT7
    -D LOAD_FONT8
    -D SMOOTH_FONT

    ; LVGL config
    -D LV_CONF_INCLUDE_SIMPLE
    -I include
